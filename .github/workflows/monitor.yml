name: Monitor przetargów OZE

on:
  schedule:
    - cron: '30 10,12,14 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Przywróć bazę danych
        uses: actions/cache@v4
        with:
          path: przetargi_oze.db
          key: przetargi-db-v2-${{ github.run_id }}
          restore-keys: przetargi-db-v2-

      - name: Zainstaluj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install requests beautifulsoup4

      - name: Uruchom monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ls -la && python oze_monitor.py
