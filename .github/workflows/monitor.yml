name: Monitor przetargów OZE

on:
  schedule:
    - cron: '30 10,12,14 * * *'   # o 10:30, 12:30 i 14:30
  workflow_dispatch:        # ręczne uruchomienie z GUI GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache bazy SQLite między uruchomieniami (opcjonalne, ale przydatne)
      - name: Przywróć bazę danych
        uses: actions/cache@v4
        with:
          path: przetargi_oze.db
          key: przetargi-db-${{ github.run_id }}
          restore-keys: przetargi-db-

      - name: Zainstaluj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install requests

      - name: Uruchom monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oze_monitor.py
